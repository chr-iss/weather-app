<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather App Pro</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        .app {
            margin-top: 80px;
        }

        .search-box input {
            padding: 12px;
            width: 220px;
            border: none;
            border-radius: 8px;
        }

        .search-box button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #222;
            color: white;
            cursor: pointer;
        }

        .card {
            margin: 30px auto;
            padding: 20px;
            width: 300px;
            border-radius: 20px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }

        img {
            width: 80px;
        }

        .hidden {
            display: none;
        }

        .error {
            color: red;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="app">
    <h1>🌦️ Weather App</h1>

    <div class="search-box">
        <input type="text" id="cityInput" placeholder="Enter city...">
        <button onclick="getWeather()">Search</button>
    </div>

    <div id="loading" class="hidden">Loading...</div>

    <div id="weatherCard" class="card hidden">
        <h2 id="cityName"></h2>
        <img id="weatherIcon" src="" alt="Weather Icon">
        <p id="temp"></p>
        <p id="desc"></p>
        <p id="humidity"></p>
        <p id="wind"></p>
    </div>

    <div id="error" class="error hidden"></div>
</div>

<script>
async function getWeather() {
    const city = document.getElementById("cityInput").value;

    const loading = document.getElementById("loading");
    const card = document.getElementById("weatherCard");
    const error = document.getElementById("error");

    loading.classList.remove("hidden");
    card.classList.add("hidden");
    error.classList.add("hidden");

    try {
        const response = await fetch(`/weather?city=${city}`);
        const data = await response.json();

        if (data.error) {
            throw new Error(data.error);
        }

        document.getElementById("cityName").innerText = data.city;
        document.getElementById("temp").innerText = `🌡️ ${data.temperature} °C`;
        document.getElementById("desc").innerText = `☁️ ${data.description}`;
        document.getElementById("humidity").innerText = `💧 Humidity: ${data.humidity}%`;
        document.getElementById("wind").innerText = `💨 Wind: ${data.wind} m/s`;

        document.getElementById("weatherIcon").src =
            `http://openweathermap.org/img/wn/${data.icon}@2x.png`;

        card.classList.remove("hidden");

    } catch (err) {
        error.innerText = "City not found!";
        error.classList.remove("hidden");
    }

    loading.classList.add("hidden");
}
</script>

</body>
</html>
